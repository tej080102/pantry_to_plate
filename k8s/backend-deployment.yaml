apiVersion: apps/v1
kind: Deployment
metadata:
  name: pantry-backend
  namespace: pantry
  labels:
    app: pantry-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pantry-backend
  template:
    metadata:
      labels:
        app: pantry-backend
    spec:
      serviceAccountName: pantry-ksa
      containers:

        - name: backend
          # REPLACE: your actual project ID
          image: us-central1-docker.pkg.dev/pantry-to-plate-491519/pantry-to-plate/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: backend-config

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DATABASE_URL

            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GOOGLE_API_KEY

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10

        # Cloud SQL Auth Proxy — connects your app to Cloud SQL securely
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
          args:
            - "--structured-logs"
            - "--port=5432"
            # REPLACE: YOUR_PROJECT_ID:us-central1:YOUR_INSTANCE_NAME
            - "pantry-to-plate-491519:us-central1:pantry-to-plate-db"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
